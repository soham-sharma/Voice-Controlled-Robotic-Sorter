# ros_gz_bridge configuration for bridging Gazebo topics to ROS 2

# DetachableJoint attach/detach for red_step_block
- ros_topic_name: /red_step_block/attach
  gz_topic_name: /red_step_block/attach
  ros_type_name: std_msgs/msg/Empty
  gz_type_name: gz.msgs.Empty
  direction: ROS_TO_GZ

- ros_topic_name: /red_step_block/detach
  gz_topic_name: /red_step_block/detach
  ros_type_name: std_msgs/msg/Empty
  gz_type_name: gz.msgs.Empty
  direction: ROS_TO_GZ

# DetachableJoint attach/detach for blue_cuboid
- ros_topic_name: /blue_cuboid/attach
  gz_topic_name: /blue_cuboid/attach
  ros_type_name: std_msgs/msg/Empty
  gz_type_name: gz.msgs.Empty
  direction: ROS_TO_GZ

- ros_topic_name: /blue_cuboid/detach
  gz_topic_name: /blue_cuboid/detach
  ros_type_name: std_msgs/msg/Empty
  gz_type_name: gz.msgs.Empty
  direction: ROS_TO_GZ

# DetachableJoint attach/detach for green_cross_block
- ros_topic_name: /green_cross_block/attach
  gz_topic_name: /green_cross_block/attach
  ros_type_name: std_msgs/msg/Empty
  gz_type_name: gz.msgs.Empty
  direction: ROS_TO_GZ

- ros_topic_name: /green_cross_block/detach
  gz_topic_name: /green_cross_block/detach
  ros_type_name: std_msgs/msg/Empty
  gz_type_name: gz.msgs.Empty
  direction: ROS_TO_GZ

# Per-model pose bridge (named, reliable)
- ros_topic_name: /gz/red_step_block/pose
  gz_topic_name: /model/red_step_block/pose
  ros_type_name: geometry_msgs/msg/Pose
  gz_type_name: gz.msgs.Pose
  direction: GZ_TO_ROS

- ros_topic_name: /gz/blue_cuboid/pose
  gz_topic_name: /model/blue_cuboid/pose
  ros_type_name: geometry_msgs/msg/Pose
  gz_type_name: gz.msgs.Pose
  direction: GZ_TO_ROS

- ros_topic_name: /gz/green_cross_block/pose
  gz_topic_name: /model/green_cross_block/pose
  ros_type_name: geometry_msgs/msg/Pose
  gz_type_name: gz.msgs.Pose
  direction: GZ_TO_ROS


